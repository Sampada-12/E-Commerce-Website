<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce website</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <!-- header section  -->
    <div class="header">
        <div class="container">
            <div class="navbar">
                <a href="">Home</a>
                <a href="">Products</a>
                <a href="">About</a>
                <a href="">Contact</a>
                <a href="">Account</a>
                <a href=""> 
                    <img src="images/cart.png" alt="cart images" id="cartimage">
                </a>
            </div>
        
        <div class="headerContent">
            <div class="headerContentItem">
              <h1> Elite Gear for <br> Elite Athletes</h1>
               <p>
                     Where performance meets style. Experience sportswear<br>
                     engineered for excellence, designed for champions.
                </p>
            </div>
            <div class="headerContentItem">
               <img src="images/image1.png" alt="image">
            </div>
        </div>
        </div>
    </div>
    <!--  featured categories  -->
      <div class=" categories">
        <div class="small-container">
            <div class="row">
            
                <img src="images/category-1.jpg" alt="categorie image"/>  
                
                <img src="images/category-2.jpg" alt="categorie image"/>
                
                <img src="images/category-3.jpg" alt="categorie image"/>
              </div>
        </div>
      </div>

      <!-------------- Our Featured Products -------------->
     <div class="feature-products">
        <h2>Feature Products</h2>
            <div class="customUnderlineContainer">
                <div class="customUnderLine"></div>
            </div>
            <div class="product-container">
                <div class="products-card">
                    <img src="images/product-1.jpg " alt="product image">
                    <span class="product-title">Red Printed T-Shirt</span>
                    <div class="starimg">
                       <span class="rating"> <img src="images/star.png" alt="star"></span>
                       <span class="rating"> <img src="images/star.png" alt="star"></span>
                       <span class="rating" > <img src="images/star.png" alt="star"></span>
                       <span class="rating"> <img src="images/star.png" alt="star"></span>
                       <span class="rating"> <img src="images/emptyStar.png" alt="star"></span>
                    </div>
                    <span class="product-pricing">₹50.00</span>
                </div>


                <div class="products-card">
                    <img src="images/product-2.jpg " alt="product image">
                    <span class="product-title">HRX Sports Shoes</span>
                    <div class="starimg">
                       <span class="rating"> <img src="images/star.png" alt="star"></span>
                       <span class="rating"> <img src="images/star.png" alt="star"></span>
                       <span class="rating" > <img src="images/star.png" alt="star"></span>
                       <span class="rating"> <img src="images/star.png" alt="star"></span>
                       <span class="rating"> <img src="images/emptyStar.png" alt="star"></span>
                    </div>
                    <span class="product-pricing">₹75.00</span>
                </div>

                <div class="products-card">
                    <img src="images/product-3.jpg " alt="product image">
                    <span class="product-title">HRX Gray Trackpants</span>
                    <div class="starimg">
                       <span class="rating"> <img src="images/star.png" alt="star"></span>
                       <span class="rating"> <img src="images/star.png" alt="star"></span>
                       <span class="rating" > <img src="images/star.png" alt="star"></span>
                       <span class="rating"> <img src="images/star.png" alt="star"></span>
                       <span class="rating"> <img src="images/emptyStar.png" alt="star"></span>
                    </div>
                    <span class="product-pricing">₹55.00</span>
                </div>

                <div class="products-card">
                    <img src="images/product-4.jpg " alt="product image">
                    <span class="product-title">Blue Printed T-Shirt</span>
                    <div class="starimg">
                       <span class="rating"> <img src="images/star.png" alt="star"></span>
                       <span class="rating"> <img src="images/star.png" alt="star"></span>
                       <span class="rating" > <img src="images/star.png" alt="star"></span>
                       <span class="rating"> <img src="images/emptyStar.png" alt="star"></span>
                       <span class="rating"> <img src="images/emptyStar.png" alt="star"></span>
                    </div>
                    <span class="product-pricing">₹80.00</span>
                </div>
                
            </div>
     </div>
</body>
</html>
